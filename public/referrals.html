<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Referrals · InternFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <div class="brand-mark">SP</div>
        <div>
          <p>SmartPortal</p>
          <span>Referral requests</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="internships.html">Internships</a>
        <a href="applications.html">Applications</a>
        <a href="referrals.html" class="active">Referrals</a>
        <a href="profile.html">Profile</a>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-button" class="btn btn-ghost">Logout</button>
      </div>
    </aside>

    <main class="main-panel">
      <header class="panel-header">
        <div>
          <p class="eyebrow">Referrals</p>
          <h1>Request a professional referral</h1>
        </div>
      </header>

      <section class="form-section">
        <form id="referral-form" class="detail-form">
          <label>
            <span>Select internship</span>
            <select name="internshipId" id="referral-job-select" required></select>
          </label>
          <label>
            <span>Your message</span>
            <textarea name="message" rows="6" placeholder="Add a short introduction and why you need a referral." required></textarea>
          </label>
          <button class="btn btn-primary" type="submit">Send referral request</button>
        </form>
      </section>

      <section class="list-panel" id="referrals-list"></section>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script src="script.js" defer></script>
</body>
</html>
