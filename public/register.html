<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register · InternFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-shell">
    <section class="auth-card glass-panel">
      <div class="auth-heading">
        <span>Join InternFlow</span>
        <h1>Create your student account</h1>
      </div>
      <form id="register-form" class="auth-form active" enctype="multipart/form-data">
        <label>
          <span>Full name</span>
          <input type="text" name="name" required />
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" required />
        </label>
        <label>
          <span>Mobile number</span>
          <input type="tel" name="mobile" />
        </label>
        <label>
          <span>Education Type</span>
          <select name="educationType" required>
            <option value="" disabled selected>Select your education</option>
            <option value="High School">High School</option>
            <option value="Undergraduate">Undergraduate (Bachelor's)</option>
            <option value="Graduate">Graduate (Master's)</option>
            <option value="Post-Graduate">Post-Graduate (PhD/Other)</option>
          </select>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" required minlength="6" />
        </label>
        <button class="btn btn-primary" type="submit">Create account</button>
      </form>
      <p class="auth-note">Already registered? <a href="login.html">Sign in</a></p>
    </section>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
