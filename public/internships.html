<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internships · SmartPortal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <div class="brand-mark">SP</div>
        <div>
          <p>SmartPortal</p>
          <span>Internship portal</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="internships.html" class="active">Internships</a>
        <a href="applications.html">Applications</a>
        <a href="referrals.html">Referrals</a>
        <a href="profile.html">Profile</a>
      </nav>
      <div class="sidebar-footer">
        <button id="theme-toggle" class="btn btn-ghost">Dark Mode</button>
        <button id="logout-button" class="btn btn-ghost">Sign Out</button>
      </div>
    </aside>

    <main class="main-panel">
      <header class="panel-header">
        <div>
          <p class="eyebrow">Internship Listings</p>
          <h1>Discover opportunities from top companies</h1>
          <p class="panel-copy">Search by title, company, or skill and apply with confidence.</p>
        </div>
        <div class="header-actions">
          <div class="search-group">
            <input id="internships-search" type="search" placeholder="Search by title, company, or skill..." />
            <button class="filter-button" type="button">All Types</button>
          </div>
        </div>
      </header>

      <section class="jobs-grid" id="internships-grid"></section>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script src="script.js" defer></script>
</body>
</html>
